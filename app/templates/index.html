<!DOCTYPE html>
<html>
<head>
    <title>EasyDB AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            font-family: "Segoe UI", sans-serif;
        }

        .chat-wrapper {
            max-width: 900px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .welcome {
            text-align: center;
            margin-top: 120px;
            opacity: 0.8;
        }

        .welcome h1 {
            font-size: 40px;
            font-weight: 600;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            max-width: 70%;
            animation: fadeIn 0.3s ease-in;
            white-space: pre-wrap;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .bot {
            background: #1e293b;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            border-top: 1px solid #334155;
        }

        input {
            flex: 1;
            background: #020617;
            border: 1px solid #334155;
            color: white;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            background: #2563eb;
            border: none;
        }

        button:hover {
            background: #1d4ed8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="chat-wrapper">

    <!-- Welcome -->
    <div id="welcome" class="welcome">
        <h1>EasyDB AI</h1>
        <p>Ask anything or manage your database using natural language</p>
    </div>

    <!-- Messages -->
    <div id="messages" class="messages"></div>

    <!-- Input -->
    <div class="input-area">
        <input id="input" class="form-control" placeholder="Type your query...">
        <button onclick="send()" class="btn btn-primary">Send</button>
    </div>

</div>

<script>

let firstMessage = true;

async function send() {
    const inputBox = document.getElementById("input");
    const text = inputBox.value;
    if (!text) return;

    // hide welcome on first message
    if (firstMessage) {
        document.getElementById("welcome").style.display = "none";
        firstMessage = false;
    }

    addMessage(text, "user");
    inputBox.value = "";

    const res = await fetch("/query", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            prompt: text,
            role: "admin"
        })
    });

    const data = await res.json();

    let output = "";

    if (data.type === "select") {
        output = formatTable(data.data);
    }
    else if (data.type === "message") {
        output = data.message;
    }
    else if (data.message) {
        output = data.message;
    }
    else if (data.error) {
        output = "Error: " + data.error;
    }

    typeEffect(output);
}


// 🔥 Typing Effect (ChatGPT style)
function typeEffect(text) {
    const msgDiv = document.createElement("div");
    msgDiv.className = "msg bot";
    document.getElementById("messages").appendChild(msgDiv);

    let i = 0;
    const speed = 15;

    function typing() {
        if (i < text.length) {
            msgDiv.innerText += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }

    typing();
}


// table formatting
function formatTable(data) {
    if (!data.length) return "No records found.";

    let table = "ID | Name | Age\n";
    table += "-------------------\n";

    data.forEach(row => {
        table += row.join(" | ") + "\n";
    });

    return table;
}


// user message
function addMessage(text, type) {
    const msgDiv = document.createElement("div");
    msgDiv.className = "msg " + type;
    msgDiv.innerText = text;

    document.getElementById("messages").appendChild(msgDiv);
}

</script>

</body>
</html>
